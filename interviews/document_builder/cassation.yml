family: cassation
label: Кассационная жалоба
template: cassation_generic.docx
template_path: document_templates/docx/cassations/cassation_generic.docx
source: interviews/document_builder/cassation.yml

fields:
  - key: cassation_court
    label: Кассационный суд
    type: text
    required: true

  - key: case_number
    label: Номер дела
    type: text
    required: true

  - key: applicant
    label: Заявитель жалобы
    type: text
    required: true

  - key: challenged_acts
    label: Обжалуемые судебные акты
    type: textarea
    required: true

  - key: material_violations
    label: Существенные нарушения норм права
    type: textarea
    required: true

  - key: grounds
    label: Доводы кассационной жалобы
    type: textarea
    required: false

  - key: requested_result
    label: Что просим у кассации
    type: textarea
    required: false

  - key: attachments
    label: Приложения
    type: textarea
    required: false

sections:
  - title: Кассационная жалоба
    body: |
      Обжалуемые судебные акты:
      {{ challenged_acts }}

      Существенные нарушения:
      {{ material_violations }}