{% extends "base.html" %}

{% block content %}
<section class="page-header">
  <p class="eyebrow">Настройки</p>
  <h1>Профиль юриста</h1>
  <p>
    Здесь хранятся базовые данные рабочего профиля LexPilot. Эти сведения нужны
    для идентификации владельца кабинета и дальнейших настроек сервиса.
  </p>
</section>

<section class="settings-single-layout">
  <form id="lawyerProfileForm" class="settings-panel settings-main-panel">
    <h2>Данные профиля</h2>

    <label>ФИО / наименование</label>
    <input name="full_name" value="{{ profile.full_name }}" placeholder="Иванов Иван Иванович">

    <label>Статус</label>
    <input name="professional_status" value="{{ profile.professional_status }}" placeholder="Адвокат / юрист / представитель">

    <label>Адрес</label>
    <textarea name="address" placeholder="Адрес рабочего профиля">{{ profile.address }}</textarea>

    <label>Телефон</label>
    <input name="phone" value="{{ profile.phone }}" placeholder="+7 ...">

    <label>Email</label>
    <input name="email" value="{{ profile.email }}" placeholder="mail@example.com">

    <label>ИНН</label>
    <input name="inn" value="{{ profile.inn }}" placeholder="ИНН">

    <label>ОГРН / ОГРНИП</label>
    <input name="ogrn" value="{{ profile.ogrn }}" placeholder="ОГРН или ОГРНИП">

    <label>Краткая подпись</label>
    <input name="signature" value="{{ profile.signature }}" placeholder="И.И. Иванов">

    <div class="form-actions">
      <button type="submit">Сохранить профиль</button>
    </div>

    <p id="settingsStatus" class="hint">Заполните или обновите данные профиля.</p>
  </form>
</section>

<script src="{{ url_for('static', filename='js/settings.js') }}"></script>
{% endblock %}
