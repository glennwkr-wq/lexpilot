<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>{{ app_name or "LexPilot" }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <aside class="sidebar">
    <div class="logo">LexPilot</div>

    <nav>
      <a href="/" class="{% if request.path == '/' %}is-active{% endif %}">Дашборд</a>
      <a href="/ask" class="{% if request.path.startswith('/ask') %}is-active{% endif %}">AI-консультация</a>
      <a href="/cases" class="{% if request.path.startswith('/cases') %}is-active{% endif %}">Дела</a>
      <a href="/clients" class="{% if request.path.startswith('/clients') %}is-active{% endif %}">Клиенты</a>
      <a href="/document-builder" class="{% if request.path.startswith('/document-builder') %}is-active{% endif %}">Генератор документов</a>
      <a href="/document-analysis" class="{% if request.path.startswith('/document-analysis') %}is-active{% endif %}">Анализ документа</a>
      <a href="/knowledge" class="{% if request.path.startswith('/knowledge') %}is-active{% endif %}">База знаний</a>
      <a href="/settings" class="{% if request.path.startswith('/settings') %}is-active{% endif %}">Настройки</a>
    </nav>
  </aside>

  <main class="main">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
